<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carte Modèle – Icônes Catégories</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Inter, sans-serif;background:linear-gradient(180deg,#f8fafc 0%, #ffffff 40%);color:#0f172a}
.container{max-width:1200px;margin:auto;padding:40px 20px;position:relative;z-index:1}
.iconAcc{width:40px;height:40px;border-radius:12px;background:#273d5b;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(15,23,42,.12)}
.iconAcc svg{width:22px;height:22px;stroke:#fff}
.btn{padding:12px;border-radius:10px;border:none;font-weight:600;cursor:pointer;background:#273d5b;color:#ffffff;box-shadow:none!important}
.chip{display:inline-flex;align-items:center;height:32px;padding:0 12px;border-radius:9999px;border:1px solid #e5e7eb;background:#f8fafc;color:#1f2937;font-weight:600;font-size:12px;cursor:pointer;user-select:none}
.pin{width:28px;height:28px;border-radius:9999px;border:2px solid #273d5b;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.pin-client{background:#16a34a}
.pin-prospect-chaud{background:#f97316}
.pin-prospect{background:#3b82f6}
.pin-fournisseur{background:#a855f7}
.pin-autre{background:#6b7280}
</style>
</head>
<body>
<div class="container">
  <div class="mb-6 flex items-center gap-3">
    <div class="iconAcc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 8 3 16 6 23 3 23 17 16 20 8 17 1 20 1 6"></polygon><line x1="8" y1="17" x2="8" y2="3"></line><line x1="16" y1="20" x2="16" y2="6"></line></svg></div>
    <div>
      <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight m-0">Carte modèle (icônes)</h1>
      <p class="text-xs md:text-sm text-slate-500">Jeu de tests avec icônes par catégorie</p>
    </div>
    <div class="ml-auto">
      <a href="map.html" class="btn">Voir carte intégrée</a>
    </div>
  </div>

  <div class="rounded-2xl border border-slate-200 bg-white shadow-card overflow-hidden">
    <div class="flex items-center gap-3 px-6 h-[64px] border-b border-slate-100">
      <div class="iconAcc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M3 12h18"></path><path d="M3 18h18"></path></svg></div>
      <div>
        <h2 class="text-[18px] m-0 font-semibold">Jeu de tests</h2>
        <p class="text-xs text-slate-500">Filtrez par catégorie pour voir les icônes</p>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <button id="reset" class="btn h-10 px-4 rounded-xl">Reset</button>
      </div>
    </div>
    <div class="px-6 py-4 space-y-3 border-b border-slate-100">
      <div class="flex flex-wrap items-center gap-2">
        <span class="chip" data-chip data-cat="client-actif">✓ Client actif</span>
        <span class="chip" data-chip data-cat="prospect-chaud">🔥 Prospect chaud</span>
        <span class="chip" data-chip data-cat="prospect">🎯 Prospect</span>
        <span class="chip" data-chip data-cat="fournisseur">🏭 Fournisseur</span>
        <span class="chip" data-chip data-cat="autre">✳️ Autre</span>
      </div>
    </div>
    <div class="p-0">
      <div id="leafmap" style="width:100%;height:75vh"></div>
    </div>
  </div>
</div>
<script>
  var map = L.map('leafmap').setView([46.6, 2.4], 5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, attribution:'© OpenStreetMap'}).addTo(map);
  var data = [
    {lat:48.8566,lng:2.3522,cat:'client-actif',label:'Client Paris',sym:'✓'},
    {lat:50.6292,lng:3.0573,cat:'client-actif',label:'Client Lille',sym:'✓'},
    {lat:45.7640,lng:4.8357,cat:'prospect-chaud',label:'Prospect chaud Lyon',sym:'🔥'},
    {lat:43.2965,lng:5.3698,cat:'prospect',label:'Prospect Marseille',sym:'🎯'},
    {lat:47.2184,lng:-1.5536,cat:'fournisseur',label:'Fournisseur Nantes',sym:'🏭'},
    {lat:44.8378,lng:-0.5792,cat:'autre',label:'Autre Bordeaux',sym:'✳️'}
  ];
  function icon(cat, sym){
    return L.divIcon({className:'', html:'<div class="pin pin-'+cat+'">'+sym+'</div>', iconSize:[28,28], iconAnchor:[14,14]});
  }
  var layers = data.map(d => L.marker([d.lat,d.lng], {icon:icon(d.cat, d.sym)}).bindPopup(d.label));
  layers.forEach(l => l.addTo(map));
  function refresh(){
    var active = new Set();
    document.querySelectorAll('[data-chip]').forEach(c => { if(c.classList.contains('active')) active.add(c.getAttribute('data-cat')); });
    if(active.size===0){ ['client-actif','prospect-chaud','prospect','fournisseur','autre'].forEach(x=>active.add(x)); }
    layers.forEach((l, i) => {
      var cat = data[i].cat;
      if(active.has(cat)){ if(!map.hasLayer(l)) l.addTo(map); }
      else { if(map.hasLayer(l)) map.removeLayer(l); }
    });
  }
  document.querySelectorAll('[data-chip]').forEach(c => c.addEventListener('click', () => {
    var on = c.classList.toggle('active');
    c.style.background = on ? '#273d5b' : '';
    c.style.color = on ? '#fff' : '';
    refresh();
  }));
  document.getElementById('reset').addEventListener('click', () => {
    document.querySelectorAll('[data-chip]').forEach(c => { c.classList.remove('active'); c.style.background=''; c.style.color=''; });
    refresh(); map.setView([46.6,2.4],5);
  });
  refresh();
</script>
</body>
</html>
